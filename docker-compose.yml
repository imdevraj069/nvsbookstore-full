version: '3.8'

services:
  # MongoDB Replica Set
  mongo-primary:
    image: mongo:7
    container_name: mongo-primary
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_primary:/data/db
      - ./infrastructure/mongo/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  mongo-secondary:
    image: mongo:7
    container_name: mongo-secondary
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_secondary:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  mongo-arbiter:
    image: mongo:7
    container_name: mongo-arbiter
    ports:
      - "27019:27017"
    volumes:
      - mongo_data_arbiter:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sarkari-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sarkari-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - sarkari-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mongo-primary
      - rabbitmq
      - redis
      - minio
    networks:
      - sarkari-network

volumes:
  mongo_data_primary:
  mongo_data_secondary:
  mongo_data_arbiter:
  rabbitmq_data:
  redis_data:
  minio_data:

networks:
  sarkari-network:
    driver: bridge
