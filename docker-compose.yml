services:
  # ═══════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════

  # MongoDB Replica Set
  mongo-primary:
    image: mongo:4.4
    container_name: mongo-primary
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_primary:/data/db
    networks:
      - sarkari-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  mongo-secondary:
    image: mongo:4.4
    container_name: mongo-secondary
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_secondary:/data/db
    networks:
      - sarkari-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  mongo-arbiter:
    image: mongo:4.4
    container_name: mongo-arbiter
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    volumes:
      - mongo_data_arbiter:/data/db
    networks:
      - sarkari-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # MongoDB Replica Set Init — runs once to initialize rs0
  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary:
        condition: service_healthy
      mongo-arbiter:
        condition: service_healthy
    volumes:
      - ./infrastructure/mongo/init-replica.sh:/init-replica.sh:ro
    entrypoint: [ "bash", "/init-replica.sh" ]
    restart: "no"
    networks:
      - sarkari-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sarkari-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sarkari-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════

  # Read Service — high-traffic reads, Redis cache, MongoDB secondary
  read-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: read-service
    container_name: read-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sarkari-network

  # Transaction Service — auth, cart, orders, payments
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: transaction-service
    container_name: transaction-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      NODE_OPTIONS: --dns-result-order=ipv4first --tls-min-v1.2
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ~/storage/invoices:/root/storage/invoices
    restart: unless-stopped
    networks:
      - sarkari-network

  # Admin Service — CRUD, file uploads to MinIO
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: admin-service
    container_name: admin-service
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      OLD_MONGODB_URI: ${OLD_MONGODB_URI}
      IMAGES_DIR: /root/storage/images
      DOCUMENTS_DIR: /root/storage/documents
    volumes:
      - ~/storage/images:/root/storage/images
      - ~/storage/documents:/root/storage/documents
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sarkari-network

  # Worker Service — background email, invoice, cache invalidation
  worker-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: worker-service
    container_name: worker-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      MONGO_URI: ${MONGO_URI}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ADMIN_MAIL: ${ADMIN_MAIL}
    volumes:
      - ~/storage/invoices:/root/storage/invoices
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    depends_on:
      - read-service
      - transaction-service
      - admin-service
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # NGINX — API Gateway + Frontend Proxy
  # ═══════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - read-service
      - transaction-service
      - admin-service
      - web
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # CLOUDFLARE TUNNEL — configured via dashboard
  # ═══════════════════════════════════════════

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sarkari-network

volumes:
  mongo_data_primary:
    name: nvsbookstore_mongo_data_primary
  mongo_data_secondary:
    name: nvsbookstore_mongo_data_secondary
  mongo_data_arbiter:
    name: nvsbookstore_mongo_data_arbiter
  rabbitmq_data:
    name: nvsbookstore_rabbitmq_data
  redis_data:
    name: nvsbookstore_redis_data

networks:
  sarkari-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
