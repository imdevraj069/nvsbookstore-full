services:
  # ═══════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════

  # MongoDB Replica Set
  mongo-primary:
    image: mongo:7
    container_name: mongo-primary
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_primary:/data/db
      - ./infrastructure/mongo/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  mongo-secondary:
    image: mongo:7
    container_name: mongo-secondary
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_secondary:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  mongo-arbiter:
    image: mongo:7
    container_name: mongo-arbiter
    ports:
      - "27019:27017"
    volumes:
      - mongo_data_arbiter:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - sarkari-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sarkari-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sarkari-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════

  # Read Service — high-traffic reads, Redis cache, MongoDB secondary
  read-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: read-service
    container_name: read-service
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      - mongo-primary
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - sarkari-network

  # Transaction Service — auth, cart, orders, payments
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: transaction-service
    container_name: transaction-service
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      - mongo-primary
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - sarkari-network

  # Admin Service — CRUD, file uploads to MinIO
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: admin-service
    container_name: admin-service
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      OLD_MONGODB_URI: ${OLD_MONGODB_URI}
    depends_on:
      - mongo-primary
      - minio
      - rabbitmq
    restart: unless-stopped
    networks:
      - sarkari-network

  # Worker Service — background email, invoice, cache invalidation
  worker-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: worker-service
    container_name: worker-service
    environment:
      MONGO_URI: ${MONGO_URI}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ADMIN_MAIL: ${ADMIN_MAIL}
    depends_on:
      - mongo-primary
      - rabbitmq
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      - read-service
      - transaction-service
      - admin-service
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # NGINX — API Gateway + Frontend Proxy
  # ═══════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - read-service
      - transaction-service
      - admin-service
      - web
    restart: unless-stopped
    networks:
      - sarkari-network

  # ═══════════════════════════════════════════
  # CLOUDFLARE TUNNEL — public temporary URL
  # ═══════════════════════════════════════════

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sarkari-network

volumes:
  mongo_data_primary:
  mongo_data_secondary:
  mongo_data_arbiter:
  rabbitmq_data:
  redis_data:
  minio_data:

networks:
  sarkari-network:
    driver: bridge
